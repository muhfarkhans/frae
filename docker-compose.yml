services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: erp_web
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      API_INTERNAL_URL: http://nginx/api
    depends_on:
      - nginx
    networks:
      - erp_network

  api:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: erp_api
    working_dir: /var/www/html
    volumes:
      - ./apps/api:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - erp_network

  nginx:
    image: nginx:alpine
    container_name: erp_nginx
    ports:
      - "8080:80"
    volumes:
      - ./apps/api:/var/www/html
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - erp_network

  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: erp_db
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    volumes:
      - erp_postgres_data:/var/lib/postgresql/data
    networks:
      - erp_network

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    ports:
      - "6379:6379"
    networks:
      - erp_network

  minio:
    image: minio/minio:latest
    container_name: erp_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: erp_minio
      MINIO_ROOT_PASSWORD: erp_minio_password
    volumes:
      - erp_minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - erp_network

volumes:
  erp_postgres_data:
  erp_minio_data:

networks:
  erp_network:
    driver: bridge
